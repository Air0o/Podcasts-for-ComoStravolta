<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Subtitle Player</title>
  <style>
    :root {
      --sand: #E9D5A2;
      --camel: #C6A67D;
      --clay: #A47A5C;
      --cocoa: #815140;
      --mahogany: #5E2F29;
      --wine: #3C1617;
      --midnight: #19070B;
      --paper: #f4ebd3;
      --ink: #2b120f;
      --muted: #70493d;
    }

    body {
      margin: 0;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      color: var(--ink);
      background: linear-gradient(145deg, var(--sand) 0%, var(--camel) 52%, var(--clay) 100%);
      min-height: 100vh;
      padding: 32px 18px;
      box-sizing: border-box;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      border-radius: 999px;
      filter: blur(6px);
      opacity: 0.35;
    }

    body::before {
      width: min(52vw, 580px);
      height: min(52vw, 580px);
      top: -160px;
      right: -140px;
      background: radial-gradient(circle, var(--wine) 0%, var(--mahogany) 55%, transparent 72%);
      animation: driftA 14s ease-in-out infinite alternate;
    }

    body::after {
      width: min(46vw, 500px);
      height: min(46vw, 500px);
      bottom: -160px;
      left: -130px;
      background: radial-gradient(circle, var(--cocoa) 0%, var(--clay) 58%, transparent 75%);
      animation: driftB 15s ease-in-out infinite alternate;
    }

    .wrap {
      width: min(860px, 100%);
      margin: 0 auto;
    }

    .card {
      background: color-mix(in srgb, var(--paper) 89%, white 11%);
      border: 2px solid color-mix(in srgb, var(--clay) 72%, var(--camel) 28%);
      border-radius: 24px;
      padding: 26px;
      box-shadow:
        0 22px 42px rgba(25, 7, 11, 0.23),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transform: translateY(6px);
      animation: settleIn 560ms cubic-bezier(0.25, 0.9, 0.3, 1) forwards;
    }

    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid color-mix(in srgb, var(--camel) 56%, white 44%);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.9vw, 2.1rem);
      letter-spacing: 0.01em;
      color: var(--wine);
      text-wrap: balance;
    }

    .tag {
      margin: 0;
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      background: color-mix(in srgb, var(--sand) 74%, white 26%);
      border: 1px solid color-mix(in srgb, var(--camel) 66%, var(--sand) 34%);
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin: 18px 0 16px;
      animation: riseIn 620ms ease both;
      animation-delay: 140ms;
    }

    label {
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--mahogany);
    }

    select,
    audio {
      width: 100%;
    }

    select {
      border: 1px solid color-mix(in srgb, var(--clay) 76%, var(--camel) 24%);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fffef9;
      color: var(--wine);
      font-size: 0.98rem;
    }

    select:focus {
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--sand) 70%, white 30%);
      border-color: var(--cocoa);
    }

    audio {
      background: color-mix(in srgb, var(--sand) 40%, white 60%);
      border-radius: 12px;
      border: 1px solid color-mix(in srgb, var(--clay) 48%, white 52%);
      padding: 4px;
    }

    .subtitle-box {
      min-height: 110px;
      border-radius: 16px;
      border: 1px solid color-mix(in srgb, var(--camel) 72%, white 28%);
      background:
        linear-gradient(130deg, rgba(233, 213, 162, 0.35), rgba(255, 255, 255, 0.9)),
        #fff;
      padding: 18px;
      display: grid;
      align-items: center;
      font-size: clamp(1.06rem, 2.4vw, 1.45rem);
      line-height: 1.45;
      font-weight: 600;
      color: var(--midnight);
      transition: border-color 0.25s ease, background 0.3s ease, transform 0.2s ease;
      animation: riseIn 620ms ease both;
      animation-delay: 220ms;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    .subtitle-box.active {
      border-color: var(--mahogany);
      background:
        linear-gradient(130deg, rgba(198, 166, 125, 0.45), rgba(255, 255, 255, 0.95)),
        #fff;
      transform: translateY(-1px);
    }

    .meta {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      letter-spacing: 0.01em;
      animation: riseIn 620ms ease both;
      animation-delay: 300ms;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    .empty {
      color: #431517;
      background: #f7e7d9;
      border: 1px solid #b58170;
      border-radius: 14px;
      padding: 14px;
      line-height: 1.4;
    }

    @keyframes settleIn {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes driftA {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(-20px, 16px) scale(1.05);
      }
    }

    @keyframes driftB {
      from {
        transform: translate(0, 0) scale(1);
      }
      to {
        transform: translate(18px, -14px) scale(1.06);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .top {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      h1 {
        font-size: clamp(1.3rem, 6.2vw, 1.7rem);
      }

      .subtitle-box {
        min-height: 96px;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <div class="top">
        <h1>Podcast</h1>
      </div>

      {% if current_track %}
        <div class="controls">
          <label for="track-select">Traccia</label>
          <select id="track-select" {% if tracks|length <= 1 %}disabled{% endif %}>
            {% for track in tracks %}
              <option value="{{ track.slug }}" {% if track.slug == current_track.slug %}selected{% endif %}>
                {{ track.title }}
              </option>
            {% endfor %}
          </select>
          <audio
            id="audio-player"
            controls
            controlslist="nodownload noremoteplayback"
            disablepictureinpicture
            disableremoteplayback
            preload="metadata"
            src="{{ current_track.audio_url }}"
          ></audio>
        </div>

        <section id="subtitle-box" class="subtitle-box" oncontextmenu="return false;">Loading subtitles...</section>
        <p id="meta" class="meta" oncontextmenu="return false;"></p>

        {{ tracks|json_script:"tracks-data" }}
        <script id="current-track" type="application/json">"{{ current_track.slug }}"</script>
        <script src="{% static 'player/player.js' %}"></script>
      {% else %}
        <p class="empty">
          No playable tracks found.
        </p>
      {% endif %}
    </main>
  </div>
</body>
</html>
