<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Subtitle Player</title>
  <link rel="stylesheet" href="{% static 'player/index.css' %}">
</head>
<body>
  <div class="wrap">
    <main class="card">
      <div class="top">
        <h1>Podcast</h1>
      </div>

      {% if current_track %}
        <div class="controls">
          <label for="track-select">Traccia</label>
          <select id="track-select" {% if tracks|length <= 1 %}disabled{% endif %}>
            {% for track in tracks %}
              <option value="{{ track.slug }}" {% if track.slug == current_track.slug %}selected{% endif %}>
                {{ track.title }}
              </option>
            {% endfor %}
          </select>
          <audio
            id="audio-player"
            controls
            controlslist="nodownload noremoteplayback"
            disablepictureinpicture
            disableremoteplayback
            preload="metadata"
            src="{{ current_track.audio_url }}"
          ></audio>
        </div>

        <section id="subtitle-box" class="subtitle-box" oncontextmenu="return false;">Loading subtitles...</section>
        <p id="meta" class="meta" oncontextmenu="return false;"></p>

        {{ tracks|json_script:"tracks-data" }}
        <script id="current-track" type="application/json">"{{ current_track.slug }}"</script>
        <script src="{% static 'player/player.js' %}"></script>
      {% else %}
        <p class="empty">
          No playable tracks found.
        </p>
      {% endif %}
    </main>
  </div>
</body>
</html>
